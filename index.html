<script type="text/babel" data-presets="react">

/*
  SECURITAS FICHAJE v5 — Airport Security Time Control

/* ── Storage ── */
function load(k, fb) {
  try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; }
  catch { return fb; }
}
function save(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) { console.warn(e); }
}

const SK = { REC: "sf5-rec", EMP: "sf5-emp", ADM: "sf5-adm", SIG: "sf5-sig" };

const TERMINALS = ["T1", "T2", "T3", "T4", "T4S", "Zona de carga", "Perímetro"];
const BREAKS = [
  { id: "desayuno", label: "Desayuno", icon: "☕", accent: "#D4A053", glow: "rgba(212,160,83,.15)" },
  { id: "descanso", label: "Descanso", icon: "⏸", accent: "#5BA4C9", glow: "rgba(91,164,201,.15)" },
  { id: "comida", label: "Comida", icon: "🍽", accent: "#9B7EC8", glow: "rgba(155,126,200,.15)" },
];

const DEFAULT_EMP = ["García López, Ana", "Martín Ruiz, Carlos", "Fernández Díaz, María", "Sánchez Torres, Pedro", "López Herrera, Laura"];

const fT = (i) => new Date(i).toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
const fTS = (i) => new Date(i).toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit" });
const fD = (i) => new Date(i).toLocaleDateString("es-ES", { day: "2-digit", month: "2-digit", year: "numeric" });
const dK = (i) => { const d = new Date(i); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`; };
const tK = () => dK(new Date().toISOString());
const mkId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

function useToast() {
  const [t, sT] = React.useState(null);
  const show = React.useCallback((m, tp = "ok") => { sT({ m, tp }); setTimeout(() => sT(null), 3500); }, []);
  const el = t ? <div className="toast" style={{ background: t.tp === "err" ? "#9B2C2C" : t.tp === "info" ? "#4A5568" : "#276749" }}>{t.m}</div> : null;
  return [el, show];
}

/* ═══ SIGNATURE PAD ═══ */
function SignaturePad({ onSave, onCancel, existingSig }) {
  const canvasRef = React.useRef(null);
  const [drawing, setDrawing] = React.useState(false);
  const [hasDrawn, setHasDrawn] = React.useState(false);

  React.useEffect(() => {
    const c = canvasRef.current;
    if (!c) return;
    const ctx = c.getContext("2d");
    c.width = c.offsetWidth * 2;
    c.height = c.offsetHeight * 2;
    ctx.scale(2, 2);
    ctx.strokeStyle = "#C8A96E";
    ctx.lineWidth = 2.5;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    if (existingSig) {
      const img = new Image();
      img.onload = () => { ctx.drawImage(img, 0, 0, c.offsetWidth, c.offsetHeight); setHasDrawn(true); };
      img.src = existingSig;
    }
  }, []);

  const getPos = (e) => {
    const c = canvasRef.current;
    const rect = c.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  };

  const start = (e) => {
    e.preventDefault();
    setDrawing(true);
    setHasDrawn(true);
    const ctx = canvasRef.current.getContext("2d");
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  };

  const draw = (e) => {
    if (!drawing) return;
    e.preventDefault();
    const ctx = canvasRef.current.getContext("2d");
    const p = getPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
  };

  const stop = (e) => {
    if (e) e.preventDefault();
    setDrawing(false);
  };

  const clear = () => {
    const c = canvasRef.current;
    const ctx = c.getContext("2d");
    ctx.clearRect(0, 0, c.width, c.height);
    setHasDrawn(false);
  };

  const handleSave = () => {
    if (!hasDrawn) return;
    const data = canvasRef.current.toDataURL("image/png");
    onSave(data);
  };

  return (
    <div className="sig-overlay">
      <div className="sig-modal">
        <div className="sig-title">✍️ Firma digital</div>
        <p className="sig-desc">Firma con el dedo o ratón en el recuadro</p>
        <div className="sig-canvas-wrap">
          <canvas
            ref={canvasRef}
            className="sig-canvas"
            onMouseDown={start} onMouseMove={draw} onMouseUp={stop} onMouseLeave={stop}
            onTouchStart={start} onTouchMove={draw} onTouchEnd={stop}
          />
          {!hasDrawn && <div className="sig-placeholder">Firmar aquí</div>}
        </div>
        <div className="sig-actions">
          <button className="sig-btn sig-btn-clear" onClick={clear}>Borrar</button>
          <button className="sig-btn sig-btn-cancel" onClick={onCancel}>Cancelar</button>
          <button className="sig-btn sig-btn-save" onClick={handleSave} style={{ opacity: hasDrawn ? 1 : 0.4 }}>Confirmar firma</button>
        </div>
      </div>
    </div>
  );
}

/* ═══ MAIN APP ═══ */
function App() {
  const [records, setRecords] = React.useState([]);
  const [employees, setEmployees] = React.useState([]);
  const [adminPin, setAdminPin] = React.useState("1234");
  const [signatures, setSignatures] = React.useState({});
  const [view, setView] = React.useState("home");
  const [agentName, setAgentName] = React.useState("");
  const [now, setNow] = React.useState(new Date());
  const [ready, setReady] = React.useState(false);

  React.useEffect(() => {
    const r = load(SK.REC, []);
    const e = load(SK.EMP, DEFAULT_EMP);
    const a = load(SK.ADM, { pin: "1234" });
    const s = load(SK.SIG, {});
    setRecords(Array.isArray(r) ? r : []);
    setEmployees(Array.isArray(e) ? e : DEFAULT_EMP);
    setAdminPin(a?.pin || "1234");
    setSignatures(s && typeof s === "object" ? s : {});
    setReady(true);
  }, []);

  React.useEffect(() => { const t = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(t); }, []);
  React.useEffect(() => { if (ready) save(SK.REC, records); }, [records, ready]);
  React.useEffect(() => { if (ready) save(SK.EMP, employees); }, [employees, ready]);
  React.useEffect(() => { if (ready) save(SK.ADM, { pin: adminPin }); }, [adminPin, ready]);
  React.useEffect(() => { if (ready) save(SK.SIG, signatures); }, [signatures, ready]);

  if (!ready) return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", background: "#0C0F14", gap: 20 }}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}} @keyframes fadeIn{from{opacity:0}to{opacity:1}}`}</style>
      <div style={{ width: 48, height: 48, border: "3px solid #1A1F2E", borderTopColor: "#C8A96E", borderRadius: "50%", animation: "spin .8s linear infinite" }} />
      <span style={{ color: "#4A5568", fontSize: 12, fontFamily: "'IBM Plex Mono', monospace", letterSpacing: 2, animation: "fadeIn 1s ease" }}>CARGANDO SISTEMA</span>
    </div>
  );

  return (
    <div style={{ minHeight: "100vh", background: "#0C0F14", color: "#E2E8F0" }}>
      <style>{CSS}</style>
      {view === "home" && <Home employees={employees} setEmployees={setEmployees} now={now}
        onAgent={(n) => { setAgentName(n); setView("agent"); }} onAdmin={() => setView("adminLogin")} />}
      {view === "adminLogin" && <AdminLogin pin={adminPin} now={now} onBack={() => setView("home")} onOk={() => setView("admin")} />}
      {view === "agent" && <Agent name={agentName} records={records} setRecords={setRecords}
        employees={employees} setEmployees={setEmployees} signatures={signatures} setSignatures={setSignatures} now={now} onOut={() => setView("home")} />}
      {view === "admin" && <Admin records={records} setRecords={setRecords} employees={employees}
        setEmployees={setEmployees} adminPin={adminPin} setAdminPin={setAdminPin} signatures={signatures} now={now} onOut={() => setView("home")} />}
    </div>
  );
}

/* ═══ HOME ═══ */
function Home({ employees, setEmployees, now, onAgent, onAdmin }) {
  const [sel, setSel] = React.useState("");
  const [custom, setCustom] = React.useState("");
  const [err, setErr] = React.useState("");

  const enter = () => {
    const name = sel === "__new__" ? custom.trim() : sel;
    if (!name) { setErr("Selecciona o escribe tu nombre"); return; }
    if (sel === "__new__" && !employees.includes(name)) setEmployees((p) => [...p, name]);
    onAgent(name);
  };

  return (
    <div className="home-wrap">
      <div className="home-glow" />
      <div className="home-grid-bg" />
      <div className="home-card">
        <div className="home-logo">
          <div className="logo-icon">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#C8A96E" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
          </div>
          <h1 className="home-title">FICHAJE<span className="home-title-dot">.</span></h1>
          <p className="home-sub">SEGURIDAD AEROPORTUARIA</p>
        </div>

        <div className="home-time-block">
          <div className="home-clock">{now.toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}</div>
          <div className="home-date">{now.toLocaleDateString("es-ES", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}</div>
        </div>

        <div className="home-sep" />

        <div className="hf">
          <label className="hf-label">Identificación del agente</label>
          <select className="hf-input" value={sel} onChange={(e) => { setSel(e.target.value); setCustom(""); setErr(""); }}>
            <option value="">— Seleccionar nombre —</option>
            {employees.map((n) => <option key={n} value={n}>{n}</option>)}
            <option value="__new__">✏️ No estoy en la lista...</option>
          </select>
        </div>
        {sel === "__new__" && (
          <div className="hf">
            <label className="hf-label">Nombre completo</label>
            <input className="hf-input" placeholder="Apellidos, Nombre" value={custom}
              onChange={(e) => { setCustom(e.target.value); setErr(""); }}
              onKeyDown={(e) => e.key === "Enter" && enter()} />
          </div>
        )}
        {err && <div className="home-err">{err}</div>}

        <button className="btn-gold" onClick={enter}>Acceder al fichaje</button>

        <div className="home-divider"><span className="home-div-line" /><span className="home-div-txt">ADMINISTRACIÓN</span><span className="home-div-line" /></div>
        <button className="btn-outline" onClick={onAdmin}>🔑 Panel de control</button>

        <div className="home-footer">Sistema de control horario · v5.0</div>
      </div>
    </div>
  );
}

/* ═══ ADMIN LOGIN ═══ */
function AdminLogin({ pin, now, onBack, onOk }) {
  const [v, setV] = React.useState("");
  const [err, setErr] = React.useState("");
  const [shake, setShake] = React.useState(false);

  const go = () => {
    if (v === pin) onOk();
    else { setErr("PIN incorrecto"); setShake(true); setTimeout(() => setShake(false), 500); setV(""); }
  };

  return (
    <div className="home-wrap">
      <div className="home-glow" />
      <div className={`home-card ${shake ? "shake" : ""}`} style={{ maxWidth: 380 }}>
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>🔐</div>
          <h2 className="home-title" style={{ fontSize: 15 }}>ACCESO RESTRINGIDO</h2>
          <p style={{ fontSize: 11, color: "#718096", marginTop: 4, letterSpacing: 1 }}>Panel de administrador</p>
        </div>
        <div className="hf">
          <label className="hf-label">PIN de acceso</label>
          <input className="hf-input pin-input" type="password" inputMode="numeric" maxLength={8} placeholder="····"
            value={v} onChange={(e) => { setV(e.target.value); setErr(""); }} onKeyDown={(e) => e.key === "Enter" && go()} autoFocus />
        </div>
        {err && <div className="home-err">{err}</div>}
        <button className="btn-gold" onClick={go} style={{ background: "linear-gradient(135deg,#9B2C2C,#822727)" }}>Verificar</button>
        <button className="btn-link" onClick={onBack}>← Volver al inicio</button>
      </div>
    </div>
  );
}

/* ═══ AGENT PANEL ═══ */
function Agent({ name, records, setRecords, employees, setEmployees, signatures, setSignatures, now, onOut }) {
  const [terminal, setTerminal] = React.useState("");
  const [jornada, setJornada] = React.useState("");
  const [showSig, setShowSig] = React.useState(false);
  const [toastEl, flash] = useToast();

  const myT = (tid) => records.filter((r) => r.employee === name && r.type === tid && dK(r.timestamp) === tK());
  const isOpen = (tid) => { const t = myT(tid); return t.filter((r) => r.event === "ida").length > t.filter((r) => r.event === "vuelta").length; };
  const lastE = (tid, ev) => { const t = myT(tid).filter((r) => r.event === ev); return t.length ? t[t.length - 1] : null; };

  const mySig = signatures[name] || null;

  const clock = (tid, ev) => {
    if (!terminal) { flash("Selecciona la terminal", "err"); return; }
    if (ev === "ida" && isOpen(tid)) { flash("Ya tienes una salida abierta", "err"); return; }
    if (ev === "vuelta" && !isOpen(tid)) { flash("Primero ficha la salida", "err"); return; }
    if (!employees.includes(name)) setEmployees((p) => [...p, name]);
    const rec = { id: mkId(), employee: name, type: tid, event: ev, terminal, jornada, signed: !!mySig, timestamp: new Date().toISOString() };
    setRecords((p) => [rec, ...p]);
    flash(`${ev === "ida" ? "Salida" : "Vuelta"} de ${BREAKS.find((b) => b.id === tid).label} — ${fT(rec.timestamp)}`);
  };

  return (
    <div>
      {toastEl}
      {showSig && <SignaturePad existingSig={mySig} onCancel={() => setShowSig(false)}
        onSave={(data) => { setSignatures((p) => ({ ...p, [name]: data })); setShowSig(false); flash("Firma guardada"); }} />}

      <header className="hdr">
        <div className="hdr-in">
          <div className="hdr-left">
            <svg className="hdr-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#C8A96E" strokeWidth="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg>
            <div><div className="hdr-t">FICHAJE</div><div className="hdr-s">Panel del agente</div></div>
          </div>
          <div className="hdr-right">
            <div className="hdr-clock">{now.toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}</div>
            <div className="hdr-date">{now.toLocaleDateString("es-ES", { weekday: "short", day: "numeric", month: "short" })}</div>
          </div>
        </div>
      </header>

      <div className="ubar"><div className="ubar-in">
        <div className="ubar-name"><span className="dot-on" />{name}{mySig && <span className="sig-badge">✍️ Firmado</span>}</div>
        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn-sm btn-sig" onClick={() => setShowSig(true)}>{mySig ? "✍️ Cambiar firma" : "✍️ Firmar"}</button>
          <button className="btn-sm btn-exit" onClick={onOut}>Salir</button>
        </div>
      </div></div>

      <main className="main">
        <section className="card">
          <div className="card-lbl">CONFIGURACIÓN DE TURNO</div>
          <div className="grid-2">
            <div className="field"><label className="fl">🏢 Terminal</label>
              <select className="sel" value={terminal} onChange={(e) => setTerminal(e.target.value)}>
                <option value="">— Seleccionar —</option>{TERMINALS.map((t) => <option key={t}>{t}</option>)}
              </select>
            </div>
            <div className="field"><label className="fl">🕐 Jornada / Horario</label>
              <input className="sel" type="text" placeholder="Ej: 06:00 – 14:00" value={jornada}
                onChange={(e) => setJornada(e.target.value)} />
            </div>
          </div>
        </section>

        <div className="brk-grid">
          {BREAKS.map((bt) => {
            const open = isOpen(bt.id);
            const idaR = lastE(bt.id, "ida"); const vueR = lastE(bt.id, "vuelta");
            let elapsed = null;
            if (open && idaR) { const d = Math.floor((now - new Date(idaR.timestamp)) / 1000); elapsed = `${String(Math.floor(d / 60)).padStart(2, "0")}:${String(d % 60).padStart(2, "0")}`; }
            let dur = null;
            if (!open && idaR && vueR) dur = `${Math.round((new Date(vueR.timestamp) - new Date(idaR.timestamp)) / 60000)} min`;
            return (
              <div key={bt.id} className={`brk ${open ? "brk-open" : ""}`} style={{ "--ac": bt.accent, "--glow": bt.glow }}>
                <div className="brk-top"><span className="brk-ic">{bt.icon}</span><span className="brk-nm">{bt.label}</span>{open && <span className="brk-live">EN CURSO</span>}</div>
                <div className="tr">
                  <div className="tc"><span className="tl">SALIDA</span><span className="tv" style={{ color: idaR ? "#C8A96E" : "#1A1F2E" }}>{idaR ? fTS(idaR.timestamp) : "--:--"}</span></div>
                  <div className="tsep">
                    <svg width="20" height="12" viewBox="0 0 20 12"><path d="M0 6h16M12 1l5 5-5 5" stroke={open ? bt.accent : "#2D3748"} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round" /></svg>
                  </div>
                  <div className="tc"><span className="tl">VUELTA</span><span className="tv" style={{ color: vueR && !open ? "#68D391" : "#1A1F2E" }}>{vueR && !open ? fTS(vueR.timestamp) : "--:--"}</span></div>
                  {elapsed && <div className="te">{elapsed}</div>}
                  {dur && <div className="td">{dur}</div>}
                </div>
                <div className="brk-btns">
                  <button className="b-ida" style={{ opacity: open ? .3 : 1 }} onClick={() => clock(bt.id, "ida")} disabled={open}>Marcar salida</button>
                  <button className="b-vue" style={{ opacity: !open ? .3 : 1 }} onClick={() => clock(bt.id, "vuelta")} disabled={!open}>Marcar vuelta</button>
                </div>
              </div>
            );
          })}
        </div>

        {/* Summary */}
        {(() => {
          const t = records.filter((r) => r.employee === name && dK(r.timestamp) === tK());
          if (!t.length) return null;
          return (
            <section className="card card-accent">
              <div className="card-lbl">RESUMEN DEL DÍA</div>
              <div className="sum-row">
                {BREAKS.map((bt) => {
                  const tr = t.filter((r) => r.type === bt.id);
                  const idas = tr.filter((r) => r.event === "ida"), vueltas = tr.filter((r) => r.event === "vuelta");
                  let tot = 0; for (let i = 0; i < Math.min(idas.length, vueltas.length); i++) tot += (new Date(vueltas[i].timestamp) - new Date(idas[i].timestamp)) / 60000;
                  return (
                    <div key={bt.id} className="sum-item">
                      <span style={{ fontSize: 22 }}>{bt.icon}</span>
                      <div><div className="sum-lbl">{bt.label}</div><div className="sum-val">{vueltas.length > 0 ? `${Math.round(tot)} min` : idas.length > 0 ? "En curso..." : "—"}</div></div>
                    </div>
                  );
                })}
              </div>
            </section>
          );
        })()}

        <div className="tip">💡 Añade esta página a la pantalla de inicio de tu móvil para usarla como app nativa</div>
      </main>
    </div>
  );
}

/* ═══ ADMIN PANEL ═══ */
function Admin({ records, setRecords, employees, setEmployees, adminPin, setAdminPin, signatures, now, onOut }) {
  const [tab, setTab] = React.useState("monitor");
  const [fE, setFE] = React.useState(""); const [fD, setFD] = React.useState("");
  const [editId, setEditId] = React.useState(null); const [editTime, setEditTime] = React.useState("");
  const [confirmDel, setConfirmDel] = React.useState(null);
  const [showPinModal, setShowPinModal] = React.useState(false); const [newPin, setNewPin] = React.useState("");
  const [toastEl, flash] = useToast();
  const fileRef = React.useRef(null);

  const allE = [...new Set([...employees, ...records.map((r) => r.employee)])].sort();
  const todayR = records.filter((r) => dK(r.timestamp) === tK());

  const agentSt = allE.map((n) => {
    const ar = todayR.filter((r) => r.employee === n);
    let cb = null;
    for (const bt of BREAKS) { if (ar.filter((r) => r.type === bt.id && r.event === "ida").length > ar.filter((r) => r.type === bt.id && r.event === "vuelta").length) { cb = bt; break; } }
    const lr = ar.length ? ar.reduce((a, b) => new Date(a.timestamp) > new Date(b.timestamp) ? a : b) : null;
    return { name: n, cnt: ar.length, cb, lr, sig: !!signatures[n] };
  });

  const del = (id) => { setRecords((p) => p.filter((r) => r.id !== id)); setConfirmDel(null); flash("Eliminado", "info"); };
  const editSave = (id) => {
    if (!editTime) return;
    setRecords((p) => p.map((r) => { if (r.id !== id) return r; const d = new Date(r.timestamp); const pts = editTime.split(":").map(Number); d.setHours(pts[0] || 0, pts[1] || 0, pts[2] || 0); return { ...r, timestamp: d.toISOString() }; }));
    setEditId(null); setEditTime(""); flash("Actualizado");
  };
  const exp = () => { const b = new Blob([JSON.stringify(records, null, 2)], { type: "application/json" }); const u = URL.createObjectURL(b); const a = document.createElement("a"); a.href = u; a.download = `fichajes_${tK()}.json`; a.click(); URL.revokeObjectURL(u); flash("Exportado"); };
  const imp = (e) => { const f = e.target.files?.[0]; if (!f) return; const r = new FileReader(); r.onload = (ev) => { try { const d = JSON.parse(ev.target.result); if (Array.isArray(d)) { const ids = new Set(records.map((r) => r.id)); setRecords((p) => [...d.filter((r) => !ids.has(r.id)), ...p]); flash(`${d.length} importados`); } } catch { flash("JSON inválido", "err"); } }; r.readAsText(f); e.target.value = ""; };
  const chPin = () => { if (!newPin || newPin.length < 4) { flash("Mínimo 4 dígitos", "err"); return; } setAdminPin(newPin); setShowPinModal(false); setNewPin(""); flash("PIN cambiado"); };

  const filtered = records.filter((r) => { if (fE && r.employee !== fE) return false; if (fD && dK(r.timestamp) !== fD) return false; return true; });

  return (
    <div>
      {toastEl}
      {confirmDel && <div className="modal-ov"><div className="modal-box"><p style={{ marginBottom: 16, color: "#E2E8F0" }}>¿Eliminar este registro?</p><div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}><button className="btn-ghost" onClick={() => setConfirmDel(null)}>Cancelar</button><button className="btn-red" onClick={() => del(confirmDel)}>Eliminar</button></div></div></div>}
      {showPinModal && <div className="modal-ov"><div className="modal-box"><p style={{ marginBottom: 12, fontWeight: 600, color: "#E2E8F0" }}>Cambiar PIN</p><input className="hf-input pin-input" type="password" inputMode="numeric" maxLength={8} placeholder="Nuevo PIN" value={newPin} onChange={(e) => setNewPin(e.target.value)} onKeyDown={(e) => e.key === "Enter" && chPin()} autoFocus style={{ marginBottom: 14 }} /><div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}><button className="btn-ghost" onClick={() => { setShowPinModal(false); setNewPin(""); }}>Cancelar</button><button className="btn-gold" onClick={chPin} style={{ width: "auto", padding: "10px 20px", fontSize: 13 }}>Guardar</button></div></div></div>}

      <header className="hdr"><div className="hdr-in">
        <div className="hdr-left"><svg className="hdr-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#C8A96E" strokeWidth="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" /></svg><div><div className="hdr-t">PANEL DE CONTROL</div><div className="hdr-s">Administrador</div></div></div>
        <div className="hdr-right"><div className="hdr-clock">{now.toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}</div><div className="hdr-date">{now.toLocaleDateString("es-ES", { weekday: "short", day: "numeric", month: "short" })}</div></div>
      </div></header>

      <div className="ubar"><div className="ubar-in">
        <div className="ubar-name"><span style={{ color: "#C8A96E" }}>🔑</span> Administrador</div>
        <div style={{ display: "flex", gap: 8 }}><button className="btn-sm" style={{ borderColor: "#2D3748", color: "#A0AEC0" }} onClick={() => setShowPinModal(true)}>🔄 PIN</button><button className="btn-sm btn-exit" onClick={onOut}>Salir</button></div>
      </div></div>

      <nav className="tabs">{[{ id: "monitor", l: "📡 Monitor" }, { id: "history", l: "📋 Historial" }, { id: "agents", l: "👥 Agentes" }].map((t) => (
        <button key={t.id} className={`tab ${tab === t.id ? "tab-on" : ""}`} onClick={() => setTab(t.id)}>{t.l}</button>
      ))}</nav>

      <main className="main">
        {tab === "monitor" && <>
          <div className="st-grid">
            <div className="st"><div className="st-n">{allE.length}</div><div className="st-l">Agentes</div></div>
            <div className="st"><div className="st-n">{todayR.length}</div><div className="st-l">Fichajes hoy</div></div>
            <div className="st"><div className="st-n" style={{ color: "#D4A053" }}>{agentSt.filter((a) => a.cb).length}</div><div className="st-l">En pausa</div></div>
            <div className="st"><div className="st-n" style={{ color: "#68D391" }}>{agentSt.filter((a) => a.cnt > 0 && !a.cb).length}</div><div className="st-l">Disponibles</div></div>
          </div>
          <section className="card"><div className="card-lbl">ESTADO EN TIEMPO REAL</div>
            {agentSt.length === 0 ? <div className="empty">No hay agentes</div> : (
              <div className="mon-grid">{agentSt.map((a) => (
                <div key={a.name} className="mon" style={{ borderLeftColor: a.cb ? "#D4A053" : a.cnt > 0 ? "#68D391" : "#2D3748" }}>
                  <div className="mon-top"><div className="mon-dot" style={{ background: a.cb ? "#D4A053" : a.cnt > 0 ? "#68D391" : "#4A5568" }} /><div className="mon-name">{a.name}</div>{a.sig && <span className="sig-mini">✍️</span>}</div>
                  <div style={{ marginBottom: 6 }}>{a.cb ? <span style={{ color: a.cb.accent, fontWeight: 600, fontSize: 13 }}>{a.cb.icon} {a.cb.label}</span> : a.cnt > 0 ? <span style={{ color: "#68D391", fontSize: 12 }}>✓ En puesto</span> : <span style={{ color: "#4A5568", fontSize: 12 }}>Sin actividad</span>}</div>
                  {a.lr && <div className="mon-last">{a.lr.event === "ida" ? "Salida" : "Vuelta"} {BREAKS.find((b) => b.id === a.lr.type)?.label} — {fTS(a.lr.timestamp)}{a.lr.terminal && <span className="mon-tag">{a.lr.terminal}</span>}{a.lr.jornada && <span className="mon-tag">{a.lr.jornada}</span>}</div>}
                  <div className="mon-cnt">{a.cnt} fichajes hoy</div>
                </div>
              ))}</div>
            )}
          </section>
        </>}

        {tab === "history" && <>
          <section className="card">
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
              <div className="card-lbl" style={{ margin: 0 }}>TODOS LOS FICHAJES</div>
              <div style={{ display: "flex", gap: 8 }}><button className="btn-sm" onClick={exp}>⬇ Exportar</button><button className="btn-sm" onClick={() => fileRef.current?.click()}>⬆ Importar</button><input ref={fileRef} type="file" accept=".json" style={{ display: "none" }} onChange={imp} /></div>
            </div>
            <div className="frow"><select className="sel" style={{ flex: 1, minWidth: 150 }} value={fE} onChange={(e) => setFE(e.target.value)}><option value="">Todos</option>{allE.map((n) => <option key={n}>{n}</option>)}</select><input className="sel" type="date" style={{ minWidth: 140 }} value={fD} onChange={(e) => setFD(e.target.value)} />{(fE || fD) && <button className="btn-clr" onClick={() => { setFE(""); setFD(""); }}>✕</button>}</div>
          </section>
          <section className="card">
            {filtered.length === 0 ? <div className="empty"><div style={{ fontSize: 40, marginBottom: 8 }}>📭</div>Sin registros</div> : (
              <div style={{ overflowX: "auto" }}><table className="tbl"><thead><tr><th>Agente</th><th>Terminal</th><th>Jornada</th><th>Tipo</th><th>Evento</th><th>Firma</th><th>Fecha</th><th>Hora</th><th style={{ width: 80 }}>Acc.</th></tr></thead><tbody>
                {filtered.slice(0, 200).map((r) => {
                  const bt = BREAKS.find((b) => b.id === r.type); const ed = editId === r.id;
                  return (<tr key={r.id}><td>{r.employee}</td><td><span className="ctag">{r.terminal || "—"}</span></td><td style={{ fontSize: 11 }}>{r.jornada || "—"}</td><td><span className="ttag" style={{ background: bt?.glow, color: bt?.accent }}>{bt?.icon} {bt?.label}</span></td><td><span className={`ev ${r.event}`}>{r.event === "ida" ? "🚪 Salida" : "✅ Vuelta"}</span></td><td>{r.signed ? <span style={{ color: "#68D391", fontSize: 11 }}>✓ Sí</span> : <span style={{ color: "#4A5568", fontSize: 11 }}>—</span>}</td><td>{fD(r.timestamp)}</td><td>{ed ? <input type="time" step="1" value={editTime} onChange={(e) => setEditTime(e.target.value)} className="einp" autoFocus /> : fT(r.timestamp)}</td><td><div style={{ display: "flex", gap: 2 }}>{ed ? <><button className="bic" onClick={() => editSave(r.id)}>💾</button><button className="bic" onClick={() => setEditId(null)}>❌</button></> : <><button className="bic" onClick={() => { setEditId(r.id); setEditTime(fT(r.timestamp)); }}>✏️</button><button className="bic" onClick={() => setConfirmDel(r.id)}>🗑️</button></>}</div></td></tr>);
                })}</tbody></table>{filtered.length > 200 && <p style={{ textAlign: "center", color: "#718096", padding: 12, fontSize: 12 }}>Mostrando 200 de {filtered.length}</p>}</div>
            )}
            <div className="rcnt">{filtered.length} registro{filtered.length !== 1 ? "s" : ""}</div>
          </section>
        </>}

        {tab === "agents" && <section className="card"><div className="card-lbl">AGENTES REGISTRADOS ({employees.length})</div>
          {employees.length === 0 ? <div className="empty">No hay agentes</div> : (
            <div className="ag-grid">{employees.map((n) => {
              const eT = todayR.filter((r) => r.employee === n);
              const lr = eT.length ? eT.reduce((a, b) => new Date(a.timestamp) > new Date(b.timestamp) ? a : b) : null;
              return (<div key={n} className="ag-card">
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div><div style={{ fontWeight: 700, fontSize: 14, color: "#F7FAFC" }}>{n}{signatures[n] && <span className="sig-mini" style={{ marginLeft: 6 }}>✍️</span>}</div><div style={{ fontSize: 11, color: "#718096", marginTop: 2 }}>{eT.length > 0 ? `${eT.length} fichajes hoy` : "Sin actividad"}{lr?.terminal && <span className="mon-tag" style={{ marginLeft: 6 }}>{lr.terminal}</span>}{lr?.jornada && <span className="mon-tag" style={{ marginLeft: 4 }}>{lr.jornada}</span>}</div></div>
                  {signatures[n] && <img src={signatures[n]} alt="firma" style={{ width: 60, height: 30, objectFit: "contain", opacity: 0.6, borderRadius: 4 }} />}
                </div>
                <button className="btn-sm" style={{ borderColor: "rgba(155,44,44,.3)", color: "#FEB2B2", fontSize: 11, marginTop: 10 }} onClick={() => { setEmployees((p) => p.filter((e) => e !== n)); flash("Eliminado", "info"); }}>🗑️ Eliminar</button>
              </div>);
            })}</div>
          )}
        </section>}
      </main>
    </div>
  );
}

.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9998;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}

.hdr-clock{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:700;color:#F7FAFC;letter-spacing:2px}

.brk-ic{font-size:26px}
.brk-nm{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;color:#F7FAFC}
.brk-live{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;color:#C8A96E;background:rgba(200,169,110,.08);padding:4px 10px;border-radius:6px;letter-spacing:1.5px;animation:pulse 1.2s ease infinite}
.tr{display:flex;align-items:center;gap:14px;padding:14px 16px;background:#0C0F14;border-radius:12px;margin-bottom:14px;flex-wrap:wrap;border:1px solid #1A1F2E}
.tc{text-align:center;min-width:55px}
.tl{display:block;font-size:9px;font-weight:700;color:#4A5568;letter-spacing:1.2px;font-family:'IBM Plex Mono',monospace;margin-bottom:4px}
.tv{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:700}
.tsep{color:#2D3748}
.te{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;color:#C8A96E;animation:pulse 1.5s ease infinite}
.td{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:#68D391;background:rgba(104,211,145,.08);padding:4px 14px;border-radius:6px}
.brk-btns{display:flex;gap:10px}
.b-ida,.b-vue{flex:1;padding:14px 10px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.3px}
.b-ida{background:rgba(200,169,110,.06);color:#C8A96E;border:1.5px solid rgba(200,169,110,.15)}
.b-ida:not(:disabled):hover{background:rgba(200,169,110,.12)}
.b-ida:not(:disabled):active,.b-vue:not(:disabled):active{transform:scale(.97)}
.b-vue{background:rgba(104,211,145,.06);color:#68D391;border:1.5px solid rgba(104,211,145,.15)}
.b-vue:not(:disabled):hover{background:rgba(104,211,145,.12)}

.sum-row{display:flex;gap:12px;flex-wrap:wrap}
.sum-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#0C0F14;border-radius:10px;flex:1 1 130px;min-width:130px;border:1px solid #1A1F2E}
.sum-lbl{font-size:10px;color:#718096}
.sum-val{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;color:#E2E8F0}
.tip{text-align:center;padding:18px;font-size:11px;color:#4A5568;border:1px dashed #1E2330;border-radius:12px;margin-top:8px;line-height:1.7}

.st-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:16px}
.st{background:#111318;border:1px solid #1E2330;border-radius:14px;padding:18px 14px;text-align:center}
.st-n{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:800;color:#F7FAFC}
.st-l{font-size:10px;color:#718096;font-weight:500;margin-top:4px;letter-spacing:.5px}

.mon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.mon{background:#0C0F14;border:1px solid #1E2330;border-radius:12px;padding:16px;border-left:3px solid #2D3748;transition:all .2s}
.mon:hover{background:#0E1219}
.mon-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.mon-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.mon-name{font-weight:600;font-size:13px;color:#E2E8F0}
.mon-last{font-size:10px;color:#718096;margin-bottom:4px}
.mon-tag{font-family:'IBM Plex Mono',monospace;font-size:9px;background:#1A1F2E;padding:1px 6px;border-radius:3px;color:#A0AEC0;margin-left:4px}
.mon-cnt{font-size:10px;color:#4A5568;font-family:'IBM Plex Mono',monospace}

.ag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.ag-card{background:#0C0F14;border:1px solid #1E2330;border-radius:12px;padding:16px}

.frow{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;align-items:center}
.btn-clr{padding:8px 14px;border:none;border-radius:8px;background:rgba(155,44,44,.1);color:#FEB2B2;font-size:12px;font-weight:600;cursor:pointer}

.tbl{width:100%;font-size:11px;border-collapse:collapse}
.tbl th{text-align:left;padding:10px 7px;border-bottom:1.5px solid #1E2330;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#4A5568;white-space:nowrap}
.tbl td{padding:9px 7px;border-bottom:1px solid #1A1F2E;vertical-align:middle;white-space:nowrap;color:#CBD5E0;font-size:11px}
.tbl tr:hover td{background:rgba(200,169,110,.02)}
.ttag{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600}
.ctag{display:inline-block;padding:2px 7px;background:#1A1F2E;border-radius:4px;font-size:10px;font-weight:600;color:#A0AEC0}
.ev{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600}
.ev.ida{background:rgba(200,169,110,.08);color:#C8A96E}
.ev.vuelta{background:rgba(104,211,145,.08);color:#68D391}
.einp{padding:5px 7px;border:1.5px solid #C8A96E;border-radius:6px;font-size:11px;width:95px;background:#0C0F14;color:#C8A96E;font-family:'IBM Plex Mono',monospace}
.bic{background:none;border:none;font-size:13px;cursor:pointer;padding:3px 5px;border-radius:6px;transition:background .15s}
.bic:hover{background:#1A1F2E}
.rcnt{margin-top:12px;font-size:10px;color:#4A5568;text-align:right;font-family:'IBM Plex Mono',monospace;letter-spacing:.5px}
.empty{text-align:center;padding:36px 20px;color:#4A5568}

@media(max-width:640px){
  .hdr-in{flex-direction:column;align-items:flex-start}
  .hdr-right{text-align:left}.hdr-clock{font-size:16px}.hdr-t{font-size:12px}
  .brk-grid{grid-template-columns:1fr}.grid-2{grid-template-columns:1fr}
  .brk-btns{flex-direction:column}
  .st-grid{grid-template-columns:repeat(2,1fr)}
  .mon-grid,.ag-grid{grid-template-columns:1fr}
  .tbl{font-size:10px}.tbl td,.tbl th{padding:7px 5px}
  .sum-row{flex-direction:column}
  .ubar-in{flex-direction:column;align-items:flex-start}
  .home-clock{font-size:30px}.home-title{font-size:22px}
  .sig-canvas{height:150px}
}
`;


// Mount the app
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

</body>
</html>
